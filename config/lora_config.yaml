model_name: "/home/admin/model/Qwen2.5-VL-7B-Instruct"
train_file: "data/processed_teacher/train.jsonl"
validation_file: "data/processed_validation/val.jsonl"
validation_raw_file: "data/raw/cleaned_test_set.json"
bio_train_file: "data/processed_bio/train.jsonl"
bio_validation_file: "data/processed_bio/val.jsonl"
bio_label_map: "data/processed_bio/label_map.json"
output_dir: "outputs/lora"
bio_output_dir: "outputs/qwen7b_bio_distill"
text_key: "input.text"
target_key: "ground_truth_entities"
max_length: 512
train_ratio: 0.95
seed: 42

training:
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 8
  learning_rate: 2e-4
  weight_decay: 0.01
  num_train_epochs: 3
  logging_steps: 50
  save_steps: 200
  fp16: false
  bf16: true
  evaluation_strategy: "steps"
  eval_steps: 200
  save_total_limit: 3
  warmup_steps: 100

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.1
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"

distillation:
  teacher_model_name: "gpt2"
  temperature: 2.0
  alpha_distill: 0.5
  alpha_ce: 0.5
  teacher_confidence: 0.9

prompt:
  template: "Extract all PII entities from the following text:\n\n{input_text}\n\nOutput a JSON mapping entity type to entity text:\n{target_text}"
  use_prompt: true
