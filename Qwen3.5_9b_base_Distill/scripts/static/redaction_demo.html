<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PII Redaction Demo</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #15202b;
      --muted: #5d6978;
      --line: #d8dee7;
      --panel: #f7f9fc;
      --brand: #0b6bcb;
      --accent: #0f8f72;
      --warn: #a05a00;
      --danger: #a52a3a;
      --tag-bg: #ffe7ba;
      --tag-line: #d28700;
      --soft: #eef3f8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: #ffffff;
    }

    header {
      border-bottom: 1px solid var(--line);
      padding: 18px 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
    }

    h1 {
      margin: 0;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 720;
      letter-spacing: 0;
    }

    main {
      display: grid;
      grid-template-columns: minmax(320px, 0.84fr) minmax(420px, 1.16fr);
      min-height: calc(100vh - 72px);
    }

    section {
      padding: 24px 28px;
    }

    section + section {
      border-left: 1px solid var(--line);
      background: var(--panel);
    }

    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 14px;
      white-space: nowrap;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--warn);
    }

    .dot.ok { background: var(--accent); }

    .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 0 0 8px;
      font-weight: 640;
    }

    .field-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin: 0 0 8px;
    }

    .field-head .label {
      margin: 0;
    }

    .counter {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    textarea {
      width: 100%;
      min-height: 320px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 14px;
      font: 15px/1.5 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
      color: var(--ink);
      background: #ffffff;
    }

    .upload-row {
      margin-top: 16px;
    }

    input[type="file"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #ffffff;
      color: var(--ink);
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 0;
    }

    button {
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      color: var(--ink);
      padding: 0 14px;
      font-weight: 680;
      cursor: pointer;
    }

    button.primary {
      background: var(--brand);
      border-color: var(--brand);
      color: #ffffff;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .primary.busy {
      background: #0a559e;
    }

    .grid {
      display: grid;
      gap: 18px;
    }

    .band {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #ffffff;
      padding: 18px 20px;
    }

    .band h2 {
      margin: 0 0 12px;
      font-size: 16px;
      letter-spacing: 0;
    }

    .highlighted {
      min-height: 120px;
      line-height: 1.65;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }

    mark.pii {
      background: var(--tag-bg);
      border: 1px solid var(--tag-line);
      border-radius: 6px;
      padding: 1px 4px;
      margin: 0 1px;
    }

    mark.pii small {
      color: #5b3a00;
      font-weight: 760;
      margin-left: 4px;
    }

    .redacted {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 15px/1.6 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .ocr-text {
      max-height: 210px;
      overflow: auto;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      font: 14px/1.55 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .placeholder {
      color: var(--muted);
      background: var(--soft);
      border-radius: 6px;
      padding: 12px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 9px 8px;
      vertical-align: top;
    }

    th {
      color: var(--muted);
      font-weight: 720;
    }

    code {
      font-family: ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
    }

    .message {
      margin-top: 12px;
      color: var(--danger);
      font-size: 14px;
      min-height: 20px;
    }

    @media (max-width: 900px) {
      header { align-items: flex-start; flex-direction: column; }
      main { grid-template-columns: 1fr; }
      section + section { border-left: 0; border-top: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header>
    <h1>PII Redaction Demo</h1>
    <div class="status"><span id="status-dot" class="dot"></span><span id="status-text">Checking API</span></div>
  </header>

  <main>
    <section>
      <div class="field-head">
        <label class="label" for="input-text">Input</label>
        <span class="counter" id="char-count">0 / 3000</span>
      </div>
      <textarea id="input-text" spellcheck="false" maxlength="3000"></textarea>
      <div class="upload-row">
        <label class="label" for="file-input">Upload Image or PDF</label>
        <input id="file-input" type="file" accept=".pdf,.png,.jpg,.jpeg,.tif,.tiff,.bmp,.webp,.txt,.csv,.json,.md,text/plain,application/pdf,image/*">
      </div>
      <div class="controls">
        <button class="primary" id="run-model">Run Model</button>
        <button id="clear">Clear</button>
      </div>
      <div class="message" id="message"></div>
    </section>

    <section class="grid">
      <div class="band" id="ocr-band" hidden>
        <h2>OCR Text</h2>
        <div class="ocr-text" id="ocr-text"></div>
      </div>
      <div class="band">
        <h2>Detected Spans</h2>
        <div class="highlighted" id="highlighted"></div>
      </div>
      <div class="band">
        <h2>Redacted Text</h2>
        <div class="redacted" id="redacted"></div>
      </div>
      <div class="band">
        <h2>Span Table</h2>
        <table>
          <thead><tr><th>Type</th><th>Offsets</th><th>Decision</th><th>Value</th></tr></thead>
          <tbody id="span-rows"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    const MAX_TEXT_CHARS = 3000;
    const state = { lastPayload: null };
    const input = document.getElementById("input-text");
    const charCount = document.getElementById("char-count");
    const fileInput = document.getElementById("file-input");
    const messageEl = document.getElementById("message");
    const ocrBand = document.getElementById("ocr-band");
    const ocrTextEl = document.getElementById("ocr-text");
    const highlightedEl = document.getElementById("highlighted");
    const redactedEl = document.getElementById("redacted");
    const spanRowsEl = document.getElementById("span-rows");
    const runButton = document.getElementById("run-model");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const runButtonLabel = runButton.textContent;

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;");
    }

    function updateCharCount() {
      charCount.textContent = `${input.value.length} / ${MAX_TEXT_CHARS}`;
    }

    function renderHighlighted(text, spans) {
      const ordered = [...spans].sort((a, b) => a.start - b.start || a.end - b.end);
      let cursor = 0;
      let html = "";
      for (const span of ordered) {
        html += escapeHtml(text.slice(cursor, span.start));
        html += `<mark class="pii">${escapeHtml(text.slice(span.start, span.end))}<small>${escapeHtml(span.type)}</small></mark>`;
        cursor = span.end;
      }
      html += escapeHtml(text.slice(cursor));
      highlightedEl.innerHTML = html || "";
    }

    function maskSensitiveText(text, spans) {
      const chars = Array.from(text || "");
      const ordered = [...spans]
        .filter((span) => Number.isInteger(span.start) && Number.isInteger(span.end))
        .sort((a, b) => a.start - b.start || b.end - a.end);
      let cursor = 0;
      for (const span of ordered) {
        const start = Math.max(cursor, Math.max(0, span.start));
        const end = Math.max(start, Math.min(chars.length, span.end));
        for (let index = start; index < end; index += 1) {
          chars[index] = "*";
        }
        cursor = Math.max(cursor, end);
      }
      return chars.join("");
    }

    function renderSpans(spans) {
      spanRowsEl.innerHTML = "";
      for (const span of spans) {
        const row = document.createElement("tr");
        row.innerHTML = `
          <td><code>${escapeHtml(span.type)}</code></td>
          <td>${span.start}-${span.end}</td>
          <td>${escapeHtml(span.decision || "")}</td>
          <td>${escapeHtml(span.value || "")}</td>
        `;
        spanRowsEl.appendChild(row);
      }
      if (!spans.length) {
        spanRowsEl.innerHTML = '<tr><td colspan="4">No spans</td></tr>';
      }
    }

    function renderDetection(payload, sourceText) {
      state.lastPayload = payload;
      renderHighlighted(sourceText, payload.spans || []);
      redactedEl.textContent = maskSensitiveText(sourceText, payload.spans || []);
      redactedEl.classList.remove("placeholder");
      highlightedEl.classList.remove("placeholder");
      renderSpans(payload.spans || []);
    }

    function renderPayload(payload) {
      ocrBand.hidden = true;
      ocrTextEl.textContent = "";
      ocrTextEl.classList.remove("placeholder");
      renderDetection(payload, payload.input_text || "");
    }

    function renderFilePayload(payload) {
      const sourceText = payload.ocr_text || payload.input_text || "";
      ocrBand.hidden = false;
      ocrTextEl.textContent = sourceText;
      ocrTextEl.classList.remove("placeholder");
      renderDetection(payload, sourceText);
    }

    function setBusy(isBusy) {
      document.querySelectorAll("button").forEach((button) => { button.disabled = isBusy; });
      fileInput.disabled = isBusy;
      runButton.textContent = isBusy ? "thinking..." : runButtonLabel;
      runButton.classList.toggle("busy", isBusy);
      if (isBusy) {
        if (fileInput.files.length) {
          ocrBand.hidden = false;
          ocrTextEl.textContent = "thinking...";
          ocrTextEl.classList.add("placeholder");
        }
        highlightedEl.textContent = "thinking...";
        redactedEl.textContent = "thinking...";
        highlightedEl.classList.add("placeholder");
        redactedEl.classList.add("placeholder");
        spanRowsEl.innerHTML = '<tr><td colspan="4">thinking...</td></tr>';
      }
    }

    async function postRedact(body) {
      setBusy(true);
      messageEl.textContent = "";
      try {
        const response = await fetch("/api/redact", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "Request failed");
        }
        renderPayload(payload);
      } catch (error) {
        messageEl.textContent = error.message;
        highlightedEl.classList.remove("placeholder");
        redactedEl.classList.remove("placeholder");
        ocrTextEl.classList.remove("placeholder");
      } finally {
        setBusy(false);
      }
    }

    async function postFileRedact(file) {
      setBusy(true);
      messageEl.textContent = "";
      try {
        const formData = new FormData();
        formData.append("file", file);
        const response = await fetch("/api/redact-file", {
          method: "POST",
          body: formData,
        });
        const payload = await response.json();
        if (!response.ok) {
          throw new Error(payload.detail || "Request failed");
        }
        renderFilePayload(payload);
      } catch (error) {
        messageEl.textContent = error.message;
        highlightedEl.classList.remove("placeholder");
        redactedEl.classList.remove("placeholder");
        ocrTextEl.classList.remove("placeholder");
      } finally {
        setBusy(false);
      }
    }

    async function loadHealth() {
      try {
        const response = await fetch("/api/health");
        const payload = await response.json();
        statusDot.classList.add("ok");
        statusText.textContent = `${payload.mode} | ${payload.model_version}`;
      } catch {
        statusText.textContent = "API unavailable";
      }
    }

    runButton.addEventListener("click", () => {
      const selectedFile = fileInput.files[0];
      if (selectedFile) {
        postFileRedact(selectedFile);
        return;
      }
      postRedact({ text: input.value });
    });

    document.getElementById("clear").addEventListener("click", () => {
      input.value = "";
      updateCharCount();
      fileInput.value = "";
      ocrBand.hidden = true;
      ocrTextEl.textContent = "";
      highlightedEl.textContent = "";
      redactedEl.textContent = "";
      spanRowsEl.innerHTML = "";
      messageEl.textContent = "";
      highlightedEl.classList.remove("placeholder");
      redactedEl.classList.remove("placeholder");
      ocrTextEl.classList.remove("placeholder");
    });

    input.addEventListener("input", updateCharCount);

    Promise.all([loadHealth()]).then(() => {
      updateCharCount();
      highlightedEl.textContent = "";
      redactedEl.textContent = "";
      spanRowsEl.innerHTML = '<tr><td colspan="4">Run the model to populate spans</td></tr>';
    });
  </script>
</body>
</html>
