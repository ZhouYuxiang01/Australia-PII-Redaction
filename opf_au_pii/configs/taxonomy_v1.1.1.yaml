evaluation_label_views:
  typed_73:
    description: Primary span-level evaluation over the 73 trainable classes.
  family_31:
    description: Fold 73 classes back to 31 parent groups (see parent_group on each class) for cross-taxonomy
      comparison.
  untyped:
    description: Boundary-only evaluation; ignore the PII type.
  source_77_audit:
    description: Reconstruct the original 77-source-type view from audit.jsonl. Training JSONL intentionally
      stays clean for OPF compatibility.
mapping_assertions:
  expected_class_count: 73
  expected_source_type_count: 77
  merges_total: 4
  merges:
  - class: EMAIL
    source_types:
    - EMAIL_ADDRESS
    - WORK_EMAIL
  - class: PHONE
    source_types:
    - AU_PHONE
    - WORK_PHONE
  - class: VEHICLE_ID
    source_types:
    - NUMBER_PLATE
    - VEHICLE_REGO
  - class: PAYMENT_CARD_NUMBER
    source_types:
    - PAYMENT_CARD_NUMBER
    - HASHED_PAYMENT_CARD_NUMBER
  allow_unmapped: false
  allow_duplicates: false
  token_label_count: 293
open_questions_for_ai_hub_signoff:
- 'Confirm whether the wrapper''s external API should expose the 73 trainable labels, or auto-collapse
  to the 31 parent groups for downstream consumers.

  '
- 'For PAYMENT_CARD_NUMBER: confirm that verified non-reversible hashes should NOT be passthrough. If
  passthrough is required, add a runtime policy rule; do not introduce a separate label.

  '
- 'Confirm NATIONALITY / CITIZENSHIP_STATUS block/high policy. Reasoning is University-policy + re-identification
  risk + ethnic-origin inference; NOT statutory under Privacy Act 1988 s.6.

  '
- 'Confirm LATITUDE / LONGITUDE default is block (current) or review. In log-style pipelines lat/long
  often appear without a person link.

  '
- 'Set the minimum positive-span gate for production thresholding. Proposed default: 500 train spans;
  below this, hold the class behind `--warn-only` in the runtime policy layer until more data is collected.

  '
- 'Confirm rare-class handling strategy after the first OPF baseline. Current recommendation: use official
  OPF training first; if rare classes fail, prefer controlled oversampling or a custom training-loop change
  only after confirming the CLI exposes no weighted-loss option.

  '
offset_policy:
  unit: Python/JSON Unicode code-point character offsets
  rule: After spans are labelled, dataset preparation must not normalise Unicode, repair mojibake, or
    rewrite newlines because this can invalidate offsets.
  validation: Every labelled span must satisfy text[start:end] == recorded value before it is emitted
    to OPF JSONL.
