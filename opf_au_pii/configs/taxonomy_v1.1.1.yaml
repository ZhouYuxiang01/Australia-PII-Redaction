  description: Email address (personal or work).
  policy: block
  cost_weight: high
  freq: 6346
  merged_from:
  - EMAIL_ADDRESS
  - WORK_EMAIL
  merge_rationale: 'Validation of au_pii_19000_final.json shows EMAIL_ADDRESS and WORK_EMAIL have zero
    domain overlap in the synthetic data (personal webmail vs institutional domains). Training them as
    separate classes would teach a domain-whitelist shortcut that does not generalise to real-world usage
    (e.g., personal Gmail used for work correspondence). Redaction action and risk profile are identical
    either way.

    '
  source_types:
  - EMAIL_ADDRESS
  - WORK_EMAIL
- code: PHONE
