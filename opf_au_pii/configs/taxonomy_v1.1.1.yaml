version: 1.1.1-draft
label_scheme: BIOES
outside_label: O
unicode_normalisation: do_not_mutate_after_labelling
newline_policy: do_not_mutate_after_labelling
student_model: openai/privacy-filter
training_strategy:
  approach: 'Use OPF official custom label space via `opf train --label-space-json`; do not manually edit
    the classification head.

    '
  span_class_count: 73
  token_label_count: 293
  token_label_formula: 1 + 4*K, where K is the number of non-background span classes
  label_space_file: custom_label_space_73.v1.1.1.json
  dataset_schema: Clean OPF JSONL with only example_id, text, and spans; audit metadata is written to
    audit.jsonl.
  source_of_truth: taxonomy_v1.1.1.yaml; scripts must derive source_type -> trainable class mapping from
    this YAML, not hard-code it.
  recommended_dataset_format: dict first, list fallback after OPF smoke test
  notes:
  - prepare_dataset_v2.py reads this taxonomy directly.
  - validate_taxonomy.py checks class count, source-type coverage, label-space alignment, optional data
    frequencies, and offset validity.
policy_modes:
  block:
    description: Precision-first. Auto-masking disrupts workflows; minimise FP.
    default_precision_floor: 0.98
    default_recall_floor: 0.9
  review:
    description: Recall-first. Ambiguous types; require human confirmation.
    default_precision_floor: 0.85
    default_recall_floor: 0.95
under_redaction_weights:
  critical: 5
  high: 3
  medium: 2
  low: 1
